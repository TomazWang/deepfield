name: Version Check

on:
  push:
    branches-ignore:
      - main
      - "release/**"
  pull_request:
    branches: [main]

jobs:
  check-versions:
    name: Verify version files are in sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check versions in sync
        run: ./scripts/check-versions.sh
